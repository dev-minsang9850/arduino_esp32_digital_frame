name: flutter_app
description: "A Flutter companion app for ESP32 BLE + Wi-Fi Smart Photo Frame."
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.6
  flutter_blue_plus: ^1.31.1
  http: ^1.2.1
  image_picker: ^1.1.2
  image: ^4.2.0
  shared_preferences: ^2.2.3
  permission_handler: ^11.3.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true
