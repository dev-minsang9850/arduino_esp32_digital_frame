; PlatformIO Project Configuration File for ESP32 CYD Smart Frame
; Hardware: ESP32-2432S028R (ILI9341 TFT 320x240 + XPT2046 resistive touch)

[env:esp32dev]
platform = espressif32
board = esp32dev
framework = arduino
monitor_speed = 115200
upload_speed = 921600

lib_deps =
    bodmer/TFT_eSPI @ ^2.5.43
    bblanchon/ArduinoJson @ ^7.0.4
    https://github.com/Bodmer/TJpg_Decoder.git
    https://github.com/PaulStoffregen/XPT2046_Touchscreen.git

build_flags =
    -DUSER_SETUP_LOADED=1
    -DILI9341_DRIVER=1
    ; SPI Pin Settings (Shared VSPI bus)
    -DTFT_MISO=12
    -DTFT_MOSI=13
    -DTFT_SCLK=14
    ; TFT Control Pins
    -DTFT_CS=15
    -DTFT_DC=2
    -DTFT_RST=-1          ; Reset pin is tied to ESP32 EN/RST pin
    -DTFT_BL=21           ; Backlight pin
    -DTFT_BACKLIGHT_ON=HIGH
    ; Font configurations for TFT_eSPI
    -DLOAD_GLCD=1
    -DLOAD_FONT2=1
    -DLOAD_FONT4=1
    -DLOAD_FONT6=1
    -DLOAD_FONT7=1
    -DLOAD_FONT8=1
    -DLOAD_GFXFF=1
    -DSMOOTH_FONT=1
    ; SPI Bus Frequency configurations
    -DSPI_FREQUENCY=55000000
    -DSPI_READ_FREQUENCY=20000000
    -DSPI_TOUCH_FREQUENCY=2500000
    ; Touch Controller CS Pin
    -DTOUCH_CS=25
